<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d16">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>Daily Todo</title>
  <style>
    :root{--bg:#0d0d16;--card:#151524;--card2:#1c1c30;--border:#252540;--text:#d0d0dd;--text2:#8888a0;--accent:#7b8aee;--accent2:#9b8cd8;--today:#5c6bc0;--urgent:#c49060;--done:#5a9e6f;--archive:#7a7a90;--danger:#c06060;--water:#4fc3f7;--cat-work:#5c6bc0;--cat-personal:#9b8cd8;--cat-health:#5a9e6f;--cat-study:#c49060;--cat-etc:#7a7a90;--safe-b:env(safe-area-inset-bottom,0px)}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,'Malgun Gothic','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;font-size:15px}
    input,textarea,select,button{font-family:inherit;font-size:inherit}button{cursor:pointer}
    a{color:var(--accent);text-decoration:none}

    /* ===== 잠금 ===== */
    #lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}
    #lock.hidden{display:none}
    .lk-t{font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:8px}
    .lk-s{color:var(--text2);font-size:.85rem;margin-bottom:30px;text-align:center}
    .pin-dots{display:flex;gap:14px;margin-bottom:30px}
    .pdot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:.2s}
    .pdot.f{background:var(--accent);border-color:var(--accent)}
    .pdot.w{background:var(--danger);border-color:var(--danger);animation:shake .4s}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .ppad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
    .pk{width:72px;height:72px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:1.5rem;font-weight:600;transition:.15s}
    .pk:active{background:var(--accent);color:#fff;transform:scale(.93)}
    .pk.fn{font-size:.78rem;color:var(--text2)}

    /* ===== 앱 ===== */
    #app{display:none}#app.show{display:block}
    .top-bar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:14px 18px 18px}
    .top-row{display:flex;align-items:center;justify-content:space-between}
    .top-date{font-size:.85rem;color:var(--text2)}
    .top-title{font-size:1.2rem;font-weight:800;color:#fff}
    .top-btns{display:flex;align-items:center;gap:2px}
    .top-btn{background:none;border:none;color:var(--text2);font-size:1.15rem;padding:10px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}

    /* ===== 탭 ===== */
    .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:90;padding-bottom:var(--safe-b)}
    .tb{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--text2);font-size:.65rem;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.2s;position:relative}
    .tb.active{color:var(--accent)}
    .tb svg{width:20px;height:20px}

    /* ===== 페이지 ===== */
    .pg{display:none;padding:0 16px 100px;max-width:600px;margin:0 auto}.pg.active{display:block}
    .sec{margin-bottom:18px}
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
    .st{font-size:.86rem;font-weight:700;color:var(--accent2)}
    .sc{font-size:.66rem;color:var(--text2);background:var(--card);padding:2px 8px;border-radius:12px}
    .sb{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:8px;font-size:.7rem}
    .sb:active{border-color:var(--accent);color:var(--accent)}
    .search{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 14px;color:var(--text);width:100%;outline:none;margin-bottom:12px;font-size:.86rem}
    .search:focus{border-color:var(--accent)}.search::placeholder{color:#555}
    .empty{text-align:center;padding:24px 16px;color:#606075;font-size:.85rem;line-height:1.6}

    /* ===== 대시보드 ===== */
    .dr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .dc{background:var(--card);border-radius:14px;padding:13px;text-align:center}
    .dn{font-size:1.7rem;font-weight:800;line-height:1}
    .dl{font-size:.68rem;color:var(--text2);margin-top:3px}

    /* 컨디션 */
    .mood-row{display:flex;justify-content:center;gap:8px;margin-bottom:12px}
    .mood-btn{width:42px;height:42px;border-radius:50%;background:var(--card);border:2px solid var(--border);font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:.2s}
    .mood-btn.sel{border-color:var(--accent);background:var(--card2);transform:scale(1.15)}
    .mood-btn:active{transform:scale(.9)}
    .mood-label{text-align:center;font-size:.72rem;color:var(--text2);margin-bottom:12px}

    /* 물 */
    .wcard{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px}
    .wtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .wt{font-size:.86rem;font-weight:700;color:var(--water)}
    .wcnt{font-size:.8rem;color:var(--text2)}
    .wcups{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
    .wcup{width:40px;height:40px;border-radius:10px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.05rem;transition:.2s;cursor:pointer}
    .wcup.f{background:rgba(79,195,247,.2);border-color:var(--water)}
    .wcup:active{transform:scale(.88)}
    .wrem{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.72rem;color:var(--text2)}
    .wrem select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:2px 6px;font-size:.72rem}

    /* 습관 */
    .hi{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:10px;margin-bottom:5px}
    .hi:active{background:var(--card2)}.hi.done{opacity:.55}
    .hic{font-size:1rem;flex-shrink:0}
    .hit{flex:1;font-size:.86rem}
    .his{font-size:.63rem;color:var(--accent);background:rgba(123,138,238,.12);padding:2px 6px;border-radius:8px}
    .hck{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
    .hi.done .hck{background:var(--done);border-color:var(--done)}
    .hck svg{width:13px;height:13px;opacity:0;transition:.2s}.hi.done .hck svg{opacity:1}

    /* 할일 */
    .ti{background:var(--card);border-radius:11px;padding:10px 13px;margin-bottom:5px;transition:.15s}
    .ti:active{transform:scale(.985);background:var(--card2)}
    .tt{display:flex;align-items:center;gap:9px}
    .tc{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
    .tc.ck{background:var(--done);border-color:var(--done)}
    .tc svg{width:13px;height:13px;opacity:0;transition:.2s}.tc.ck svg{opacity:1}
    .tif{flex:1;min-width:0}
    .tit{font-size:.88rem;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tm{font-size:.68rem;color:var(--text2);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
    .tg{padding:1px 6px;border-radius:5px;font-size:.6rem;font-weight:600}
    .tg.today{background:rgba(92,107,192,.2);color:var(--today)}
    .tg.urgent{background:rgba(196,144,96,.15);color:var(--urgent)}
    .tg.future{background:rgba(120,120,150,.15);color:var(--text2)}
    .tg.repeat{background:rgba(123,138,238,.12);color:var(--accent)}
    .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* 루틴 */
    .ri{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--card);border-radius:10px;margin-bottom:4px}
    .ri:active{background:var(--card2)}.ri.done{opacity:.55}.ri.done .rt{text-decoration:line-through}
    .rt{flex:1;font-size:.84rem}

    /* 달력 */
    .cal{background:var(--card);border-radius:14px;padding:12px}
    .calh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .calt{font-size:.86rem;font-weight:700}
    .caln{background:none;border:none;color:var(--text2);font-size:1rem;padding:4px 8px}
    .calg{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:1px}
    .cdn{font-size:.6rem;color:var(--text2);padding:3px 0}
    .cd{font-size:.73rem;padding:5px 0;border-radius:8px;color:var(--text2);position:relative;cursor:pointer}
    .cd:active{background:var(--card2)}
    .cd.today{color:#fff;font-weight:700;background:var(--today)}
    .cd.ht::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
    .cd.oth{opacity:.25}

    /* 주간 뷰 */
    .wk-row{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}
    .wk-day{min-width:calc((100% - 24px)/7);background:var(--card);border-radius:10px;padding:8px 6px;text-align:center;flex-shrink:0}
    .wk-day.today{border:1.5px solid var(--accent)}
    .wk-dn{font-size:.6rem;color:var(--text2)}
    .wk-dd{font-size:.9rem;font-weight:700;margin:2px 0}
    .wk-cnt{font-size:.58rem;color:var(--text2)}
    .wk-dots{display:flex;gap:2px;justify-content:center;margin-top:3px;flex-wrap:wrap}
    .wk-dot{width:5px;height:5px;border-radius:50%}

    /* D-day */
    .ddi{background:var(--card);border-radius:11px;padding:11px 14px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
    .ddn{font-size:.86rem}.ddc{font-size:.95rem;font-weight:800}
    .ddc.past{color:var(--done)}.ddc.fut{color:var(--accent)}
    .ddd{font-size:.68rem;color:var(--text2)}

    /* 메모 */
    .memo-a{background:var(--card);border-radius:12px;padding:11px 14px}
    .memo-i{width:100%;background:transparent;border:none;color:var(--text);resize:none;outline:none;font-size:.84rem;line-height:1.5;min-height:44px}
    .memo-i::placeholder{color:#555}
    .mi{padding:6px 10px;background:var(--bg);border-radius:8px;margin-top:4px;font-size:.78rem;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
    .mi .mt{flex:1;line-height:1.4;white-space:pre-wrap;word-break:break-word}
    .mi .md{font-size:.68rem;color:var(--text2);white-space:nowrap}
    .mi .mx{background:none;border:none;color:#666;font-size:.85rem;padding:6px;min-width:32px;min-height:32px;flex-shrink:0}

    /* 통계 */
    .stc{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px}
    .stt{font-size:.78rem;color:var(--text2);margin-bottom:8px}
    .sbr{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .sbl{font-size:.7rem;color:var(--text2);width:28px;text-align:right}
    .sbb{flex:1;background:var(--bg);border-radius:6px;height:7px;overflow:hidden}
    .sbf{height:100%;border-radius:6px;transition:width .5s}

    /* 뽀모도로 */
    .pomo{background:var(--card);border-radius:16px;padding:20px;text-align:center;margin-bottom:12px}
    .pomo-time{font-size:3rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px}
    .pomo-label{font-size:.78rem;color:var(--text2);margin:6px 0 14px}
    .pomo-btns{display:flex;gap:10px;justify-content:center}
    .pomo-btn{padding:10px 24px;border-radius:12px;border:none;font-size:.88rem;font-weight:600;transition:.15s}
    .pomo-btn:active{transform:scale(.95)}
    .pomo-btn.start{background:var(--accent);color:#fff}
    .pomo-btn.stop{background:var(--danger);color:#fff}
    .pomo-btn.reset{background:var(--card2);color:var(--text)}
    .pomo-count{margin-top:12px;font-size:.72rem;color:var(--text2)}

    /* 모달 */
    .mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
    .mbg.open{display:flex}
    .mdl{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px 18px;padding-bottom:calc(20px + var(--safe-b));animation:su .3s ease}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
    .mhd{font-size:1.02rem;font-weight:700;color:#fff;margin-bottom:14px}
    .fg{margin-bottom:11px}
    .fl{font-size:.74rem;color:var(--text2);margin-bottom:4px;display:block}
    .fi{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);outline:none}
    .fi:focus{border-color:var(--accent)}.fi::placeholder{color:#555}
    textarea.fi{resize:none;min-height:55px;line-height:1.4}
    .fr{display:flex;gap:10px}.fr>*{flex:1}
    .fck{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2);cursor:pointer}
    .fck input{accent-color:var(--accent);width:16px;height:16px}
    .bp{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-size:.9rem;font-weight:700}
    .bp:active{opacity:.85;transform:scale(.98)}
    .bs{width:100%;padding:11px;background:var(--card2);border:none;border-radius:10px;color:var(--text);font-size:.86rem;margin-top:8px}
    .br{display:flex;gap:8px;margin-top:10px}.br button{flex:1;padding:11px;border:none;border-radius:10px;font-size:.83rem;font-weight:600}
    .bdone{background:rgba(90,158,111,.2);color:var(--done)}
    .barch{background:rgba(122,122,144,.15);color:var(--archive)}
    .brest{background:rgba(123,138,238,.15);color:var(--accent)}
    .bdang{background:rgba(192,96,96,.15);color:var(--danger)}
    .bedit{background:rgba(123,138,238,.15);color:var(--accent)}
    .bdl{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:.8rem;width:100%;margin-bottom:10px}
    .bdl:active{border-color:var(--done);color:var(--done)}

    /* 카테고리 선택 */
    .cat-pick{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    .cat-chip{padding:8px 14px;border-radius:8px;font-size:.78rem;border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px}
    .cat-chip.sel{border-color:var(--accent);color:var(--accent);background:rgba(123,138,238,.1)}

    /* FAB */
    .fab{position:fixed;bottom:calc(60px + var(--safe-b));right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:1.7rem;z-index:80;box-shadow:0 4px 16px rgba(123,138,238,.25);display:flex;align-items:center;justify-content:center}
    .fab:active{transform:scale(.88)}
    .toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card2);color:var(--text);padding:9px 22px;border-radius:12px;font-size:.78rem;z-index:500;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* 눈 쉬기 오버레이 */
    #eyeRest{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9998;flex-direction:column;align-items:center;justify-content:center;color:#fff}
    #eyeRest.show{display:flex}
    .eye-icon{font-size:3rem;margin-bottom:16px}
    .eye-msg{font-size:1.1rem;font-weight:600;margin-bottom:8px}
    .eye-sub{font-size:.85rem;color:var(--text2);margin-bottom:20px;text-align:center;line-height:1.5}
    .eye-timer{font-size:2.5rem;font-weight:800;color:var(--accent);margin-bottom:20px}
    .eye-skip{background:none;border:1px solid var(--border);color:var(--text2);padding:10px 30px;border-radius:12px;font-size:.85rem}
  </style>
</head>
<body>

<!-- 잠금 -->
<div id="lock">
  <div class="lk-t">Daily Todo</div>
  <div class="lk-s" id="lkS">PIN 4자리를 입력하세요</div>
  <div class="pin-dots" id="pDots"><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div></div>
  <div class="ppad" id="pPad">
    <button class="pk" data-v="1">1</button><button class="pk" data-v="2">2</button><button class="pk" data-v="3">3</button>
    <button class="pk" data-v="4">4</button><button class="pk" data-v="5">5</button><button class="pk" data-v="6">6</button>
    <button class="pk" data-v="7">7</button><button class="pk" data-v="8">8</button><button class="pk" data-v="9">9</button>
    <button class="pk fn" data-v="reset" id="pReset" style="visibility:hidden">초기화</button>
    <button class="pk" data-v="0">0</button><button class="pk fn" data-v="del">⌫</button>
  </div>
</div>

<!-- 눈 쉬기 -->
<div id="eyeRest">
  <div class="eye-icon">👀</div>
  <div class="eye-msg">눈을 쉬어주세요</div>
  <div class="eye-sub">20초 동안 6m(20ft) 먼 곳을 바라보세요<br>눈 건강을 위한 20-20-20 규칙</div>
  <div class="eye-timer" id="eyeTimer">20</div>
  <button class="eye-skip" id="eyeSkip">건너뛰기</button>
</div>

<!-- 앱 -->
<div id="app">
  <div class="top-bar">
    <div class="top-row">
      <div><div class="top-date" id="topDate"></div><div class="top-title" id="topTitle">오늘</div></div>
      <div class="top-btns">
        <button class="top-btn" id="btnEye" title="눈 쉬기">👀</button>
        <button class="top-btn" id="btnLogout" title="잠금">🔒</button>
      </div>
    </div>
  </div>

  <!-- 오늘 -->
  <div class="pg active" id="pageToday">
    <!-- 컨디션 -->
    <div class="mood-label" id="moodLabel">오늘 기분은?</div>
    <div class="mood-row" id="moodRow"></div>
    <!-- 대시 -->
    <div class="dr">
      <div class="dc"><div class="dn" id="dTodo" style="color:var(--accent)">0</div><div class="dl">할 일</div></div>
      <div class="dc"><div class="dn" id="dDone" style="color:var(--done)">0</div><div class="dl">완료</div></div>
    </div>
    <div class="dr">
      <div class="dc"><div class="dn" id="dHabit" style="color:var(--accent2)">0%</div><div class="dl">습관</div></div>
      <div class="dc"><div class="dn" id="dDday" style="color:var(--urgent)">-</div><div class="dl">D-day</div></div>
    </div>
    <!-- 다음 알람 -->
    <div id="nextAlarm"></div>
    <!-- 뽀모도로 -->
    <div class="pomo" id="pomoSection">
      <div class="pomo-time" id="pomoTime">25:00</div>
      <div class="pomo-label" id="pomoLabel">집중 모드</div>
      <div class="pomo-btns">
        <button class="pomo-btn start" id="pomoStart">시작</button>
        <button class="pomo-btn reset" id="pomoReset">리셋</button>
      </div>
      <div class="pomo-count" id="pomoCount"></div>
    </div>
    <!-- 물 -->
    <div class="wcard">
      <div class="wtop"><span class="wt">💧 물 마시기</span><span class="wcnt" id="wCnt">0/8</span></div>
      <div class="wcups" id="wCups"></div>
      <div class="wrem"><span>알림:</span><select id="wInt"><option value="0">끄기</option><option value="30">30분</option><option value="60" selected>1시간</option><option value="90">1.5시간</option><option value="120">2시간</option></select></div>
    </div>
    <!-- 습관 -->

<div class="toast" id="toast"></div>

<script>
// ===== 유틸 =====
const K='dt_v5',PK='dt_pin';
function td(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dl(s){if(!s)return'';const d=new Date(s+'T00:00:00');return(d.getMonth()+1)+'/'+d.getDate()+'('+['일','월','화','수','목','금','토'][d.getDay()]+')'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function load(){try{return JSON.parse(localStorage.getItem(K))}catch{return null}}
function save(){localStorage.setItem(K,JSON.stringify(S));_tm={};S.tasks.forEach(t=>{_tm[t.id]=t})}
let _tm={};const T=td();
const CATS=[{id:'work',name:'업무',color:'var(--cat-work)'},{id:'personal',name:'개인',color:'var(--cat-personal)'},{id:'health',name:'건강',color:'var(--cat-health)'},{id:'study',name:'공부',color:'var(--cat-study)'},{id:'etc',name:'기타',color:'var(--cat-etc)'}];
const MOODS=[{e:'😊',l:'좋음'},{e:'🙂',l:'보통'},{e:'😐',l:'그저그럼'},{e:'😔',l:'별로'},{e:'😫',l:'힘듦'}];
const DR=['기상 후 물 한 잔','스트레칭 10분','오늘 할일 정리','운동 30분','독서 20분','하루 회고 작성'];
const DH=[{name:'비타민 챙기기',icon:'💊',alarm:0},{name:'산책하기',icon:'🚶',alarm:0}];

// ===== 상태 초기화 =====
let S=load();
if(!S)S={routines:DR.slice(),rC:{},tasks:[],memos:[],habits:DH.map((h,i)=>({id:Date.now()+i,...h})),hC:{},water:{},wGoal:8,wInt:60,ddays:[],moods:{},eyeInt:20,autoLock:5,lastDate:T};
// 마이그레이션
if(!S.moods)S.moods={};if(!S.eyeInt)S.eyeInt=20;if(!S.autoLock)S.autoLock=5;if(!S.habits)S.habits=[];if(!S.hC)S.hC={};if(!S.water)S.water={};if(!S.ddays)S.ddays=[];if(!S.memos)S.memos=[];if(!S.wGoal)S.wGoal=8;if(!S.wInt)S.wInt=60;
// 날짜 변경
if(S.lastDate!==T){
  S.rC[T]=new Array(S.routines.length).fill(false);
  S.hC[T]=new Array(S.habits.length).fill(false);
  S.water[T]=0;
  S.tasks.forEach(t=>{if(t.status==='todo'&&t.date&&t.date<T&&!t.repeat)t.date=T});
  let repIdx=0;
  S.tasks.filter(t=>t.repeat&&t.status==='done').forEach(t=>{
    const dow=new Date().getDay();
    const ok=t.repeat==='daily'||(t.repeat==='weekday'&&dow>=1&&dow<=5)||(t.repeat==='weekly'&&new Date(t.date+'T00:00:00').getDay()===dow)||(t.repeat==='monthly'&&parseInt((t.date||'').split('-')[2])===new Date().getDate());
    const alreadyExists=S.tasks.some(x=>x.status==='todo'&&x.title===t.title&&x.date===T&&x.repeat===t.repeat);
    if(ok&&!alreadyExists){repIdx++;S.tasks.push({...t,id:Date.now()+repIdx,status:'todo',date:T,completedAt:null})}
  });
  S.lastDate=T;
  ['rC','hC','water'].forEach(k=>{if(S[k])Object.keys(S[k]).forEach(d=>{if((new Date(T)-new Date(d))/864e5>30)delete S[k][d]})});
  save();
}
if(!S.rC[T]||S.rC[T].length!==S.routines.length){const o=S.rC[T]||[];S.rC[T]=S.routines.map((_,i)=>o[i]||false)}
if(!S.hC[T]||S.hC[T].length!==S.habits.length){const o=S.hC[T]||[];S.hC[T]=S.habits.map((_,i)=>o[i]||false)}
if(S.water[T]==null)S.water[T]=0;
save();

// ===== PIN =====
let pb='',pm='login',pv='';
const lkEl=$('lock'),dots=$('pDots').children,lkS=$('lkS');
function $(id){return document.getElementById(id)}
function hp(){return!!localStorage.getItem(PK)}
function hash(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}return''+h}
function initLk(){if(!hp()){pm='setup';lkS.textContent='새 PIN 4자리를 설정하세요';$('pReset').style.visibility='hidden'}else{pm='login';lkS.textContent='PIN 4자리를 입력하세요';$('pReset').style.visibility='visible'}pb='';uDots()}
function uDots(w){Array.from(dots).forEach((d,i)=>{d.className='pdot'+(i<pb.length?' f':'')+(w?' w':'')})}
function hPin(v){
  if(v==='del'){pb=pb.slice(0,-1);uDots();return}
  if(v==='reset'){if(confirm('초기화 시 모든 데이터 삭제됩니다')){localStorage.removeItem(PK);localStorage.removeItem(K);location.reload()}return}
  if(pb.length>=4)return;pb+=v;uDots();
  if(pb.length===4)setTimeout(()=>{
    if(pm==='setup'){pv=pb;pm='confirm';lkS.textContent='확인을 위해 한 번 더';pb='';uDots()}
    else if(pm==='confirm'){if(pb===pv){localStorage.setItem(PK,hash(pb));toast('PIN 설정 완료');unlock()}else{uDots(true);setTimeout(()=>{pm='setup';lkS.textContent='다시 설정하세요';pb='';uDots()},800)}}
    else{if(hash(pb)===localStorage.getItem(PK))unlock();else{uDots(true);setTimeout(()=>{pb='';uDots()},500)}}
  },150);
}
$('pPad').addEventListener('click',e=>{const b=e.target.closest('.pk');if(b)hPin(b.dataset.v)});
function unlock(){lkEl.classList.add('hidden');$('app').classList.add('show');R();startAlarms();startEye();startAutoLock()}

// ===== 탭 =====
const pn={pageToday:'오늘',pageTodo:'할 일',pageDone:'기록',pageSet:'설정'};let cp='pageToday';
document.querySelector('.tab-bar').addEventListener('click',e=>{const b=e.target.closest('.tb');if(!b)return;cp=b.dataset.p;document.querySelectorAll('.tb').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.pg').forEach(p=>p.classList.toggle('active',p.id===cp));$('topTitle').textContent=pn[cp];R()});

// ===== FAB / 토스트 / 모달 =====
$('fab').addEventListener('click',()=>opTM());
let tT;function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>e.classList.remove('show'),1800)}
function opM(id){$(id).classList.add('open')}function clM(id){$(id).classList.remove('open')}
document.querySelectorAll('.mbg').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)clM(m.id)})});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.mbg.open').forEach(m=>clM(m.id))}});

// ===== 컨디션 =====
function rMood(){
  const cur=S.moods[T];
  $('moodRow').innerHTML=MOODS.map((m,i)=>'<button class="mood-btn'+(cur===i?' sel':'')+'" data-i="'+i+'">'+m.e+'</button>').join('');
  $('moodLabel').textContent=cur!=null?'오늘 기분: '+MOODS[cur].l:'오늘 기분은?';
}
$('moodRow').addEventListener('click',e=>{const b=e.target.closest('.mood-btn');if(!b)return;S.moods[T]=parseInt(b.dataset.i);save();rMood();toast(MOODS[S.moods[T]].l+' 기록됨')});

// ===== 물 =====
function rW(){
  const c=S.water[T]||0;$('wCnt').textContent=c+'/'+S.wGoal;
  let h='';for(let i=0;i<S.wGoal;i++)h+='<div class="wcup'+(i<c?' f':'')+'" data-i="'+i+'">💧</div>';
  $('wCups').innerHTML=h;$('wInt').value=S.wInt||60;
}
$('wCups').addEventListener('click',e=>{const c=e.target.closest('.wcup');if(!c)return;const i=parseInt(c.dataset.i);S.water[T]=i<(S.water[T]||0)?i:i+1;save();rW();rDash();if(S.water[T]>=S.wGoal)toast('물 목표 달성!')});
$('wInt').addEventListener('change',e=>{S.wInt=parseInt(e.target.value);save();startAlarms()});

// ===== 습관 =====
function rH(){
  const ch=S.hC[T]||[];
  $('hList').innerHTML=S.habits.length===0?'<div class="empty">습관을 추가하세요</div>':
    S.habits.map((h,i)=>{const sk=gStreak(i);return'<div class="hi'+(ch[i]?' done':'')+'" onclick="tH('+i+')"><div class="hck"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="hic">'+esc(h.icon||'✅')+'</span><span class="hit">'+esc(h.name)+'</span>'+(sk>1?'<span class="his">🔥'+sk+'일</span>':'')+'</div>'}).join('');
  $('hCnt').textContent=ch.filter(Boolean).length+'/'+S.habits.length;
}
function gStreak(idx){let s=0;const d=new Date();for(let i=0;i<60;i++){const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const c=S.hC[ds];if(c&&c[idx])s++;else if(i>0)break;d.setDate(d.getDate()-1)}return s}
window.tH=function(i){if(!S.hC[T])S.hC[T]=new Array(S.habits.length).fill(false);S.hC[T][i]=!S.hC[T][i];save();rH();rDash();if(S.hC[T][i])toast('완료!')};
$('bMH').addEventListener('click',()=>{opM('mHab');rHM()});
$('bAH').addEventListener('click',aH);$('nHN').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();aH()}});
function aH(){const n=$('nHN').value.trim();if(!n)return;S.habits.push({id:Date.now(),name:n,icon:$('nHI').value.trim()||'✅',alarm:parseInt($('nHA').value)||0});if(!S.hC[T])S.hC[T]=[];S.hC[T].push(false);save();$('nHN').value='';$('nHI').value='';rHM();toast('추가')}
function rHM(){$('hML').innerHTML=S.habits.length===0?'<div class="empty">없음</div>':S.habits.map((h,i)=>'<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg);border-radius:8px;margin-bottom:4px"><span>'+esc(h.icon)+'</span><span style="flex:1;font-size:.84rem">'+esc(h.name)+'</span><button class="sb" onclick="dH('+i+')" style="color:var(--danger);border-color:var(--danger)">삭제</button></div>').join('')}
window.dH=function(i){if(!confirm('삭제?'))return;S.habits.splice(i,1);if(S.hC[T])S.hC[T].splice(i,1);save();rHM()};

// ===== D-day =====
$('bAD').addEventListener('click',()=>{$('ddN').value='';$('ddD').value='';opM('mDd')});
$('bSD').addEventListener('click',()=>{const n=$('ddN').value.trim(),d=$('ddD').value;if(!n||!d){toast('입력하세요');return}S.ddays.push({id:Date.now(),name:n,date:d});save();clM('mDd');R();toast('추가')});
function rDD(){
  const s=[...S.ddays].sort((a,b)=>a.date.localeCompare(b.date));

let cY,cM;(function(){const d=new Date();cY=d.getFullYear();cM=d.getMonth()})();
function rCal(cid,fltr){
  const el=$(cid);const first=new Date(cY,cM,1);const last=new Date(cY,cM+1,0);const sd=first.getDay(),dim=last.getDate();
  const tds=new Set();S.tasks.filter(fltr).forEach(t=>{if(t.date&&t.date.startsWith(cY+'-'+String(cM+1).padStart(2,'0')))tds.add(parseInt(t.date.split('-')[2]))});
  const now=new Date();
  let h='<div class="calh"><button class="caln" onclick="cN(-1,\''+cid+'\','+(fltr.toString().includes('done')?1:0)+')">◂</button><span class="calt">'+cY+'년 '+(cM+1)+'월</span><button class="caln" onclick="cN(1,\''+cid+'\','+(fltr.toString().includes('done')?1:0)+')">▸</button></div><div class="calg">';
  ['일','월','화','수','목','금','토'].forEach(d=>h+='<div class="cdn">'+d+'</div>');
  for(let i=0;i<sd;i++)h+='<div class="cd oth"></div>';
  for(let d=1;d<=dim;d++){const isT=cY===now.getFullYear()&&cM===now.getMonth()&&d===now.getDate();const ds=cY+'-'+String(cM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');h+='<div class="cd'+(isT?' today':'')+(tds.has(d)?' ht':'')+'" onclick="cDC(\''+ds+'\')">'+d+'</div>'}
  h+='</div>';el.innerHTML=h;
}
window.cN=function(dir,cid,isDone){cM+=dir;if(cM<0){cM=11;cY--}if(cM>11){cM=0;cY++}rCal(cid,isDone?t=>t.status==='done':t=>t.status==='todo')};
window.cDC=function(ds){opTM();$('fDt').value=ds};

function rWeek(){
  const now=new Date();const dow=now.getDay();const mon=new Date(now);mon.setDate(mon.getDate()-(dow===0?6:dow-1));
  let h='';
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const isT=ds===T;
    const tasks=S.tasks.filter(t=>t.date===ds&&t.status==='todo');
    const done=S.tasks.filter(t=>t.date===ds&&t.status==='done');
    h+='<div class="wk-day'+(isT?' today':'')+'"><div class="wk-dn">'+['월','화','수','목','금','토','일'][i]+'</div><div class="wk-dd">'+d.getDate()+'</div><div class="wk-cnt">'+done.length+'/'+( tasks.length+done.length)+'</div><div class="wk-dots">'+tasks.map(t=>'<div class="wk-dot" style="background:'+(CATS.find(c=>c.id===t.cat)||{color:'var(--text2)'}).color+'"></div>').join('')+'</div></div>';
  }
  $('weekView').innerHTML=h;
}

let pomoState='idle',pomoSec=25*60,pomoTimer=null,pomoRounds=0;
function rPomo(){
  const m=Math.floor(pomoSec/60),s=pomoSec%60;
  $('pomoTime').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  $('pomoLabel').textContent=pomoState==='work'?'집중 중...':pomoState==='break'?'휴식 중...':'집중 모드';
  $('pomoStart').textContent=pomoState==='idle'?'시작':'일시정지';
  $('pomoStart').className='pomo-btn '+(pomoState==='idle'?'start':'stop');
  $('pomoCount').textContent=pomoRounds>0?'오늘 '+pomoRounds+'회 집중':'25분 집중 + 5분 휴식';
}
function pomoTick(){
  pomoSec--;
  if(pomoSec<=0){
    clearInterval(pomoTimer);
    if(pomoState==='work'){pomoRounds++;pomoState='break';pomoSec=5*60;notify('🍅 휴식 시간!','5분간 쉬세요');pomoTimer=setInterval(pomoTick,1000)}
    else{pomoState='idle';pomoSec=25*60;notify('🍅 휴식 끝!','다시 집중할 준비가 됐나요?')}
  }
  rPomo();
}
$('pomoStart').addEventListener('click',()=>{
  if(pomoState==='idle'){pomoState='work';pomoSec=25*60;pomoTimer=setInterval(pomoTick,1000)}
  else{clearInterval(pomoTimer);pomoState='idle';pomoSec=25*60}rPomo()
});
$('pomoReset').addEventListener('click',()=>{clearInterval(pomoTimer);pomoState='idle';pomoSec=25*60;rPomo()});

  const meta=[];if(t.date&&t.date!==T)meta.push(dl(t.date));if(t.time)meta.push(t.time);
  const cat=CATS.find(c=>c.id===t.cat);
  return'<div class="ti" onclick="opDet(_tm['+t.id+'])"><div class="tt"><div class="tc" onclick="event.stopPropagation();qD('+t.id+')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>'+(cat?'<span class="cat-dot" style="background:'+cat.color+'"></span>':'')+'<div class="tif"><div class="tit">'+esc(t.title)+'</div><div class="tm"><span class="tg '+tag+'">'+(tag==='today'?'오늘':tag==='urgent'?'며칠 내':dl(t.date))+'</span>'+(t.repeat?'<span class="tg repeat">반복</span>':'')+(t.alarm!=null?'<span>⏰</span>':'')+(meta.length?'<span>'+meta.join(' · ')+'</span>':'')+'</div></div></div></div>'
}

// ===== 전체 렌더 =====
function R(){
  save();
  const d=new Date();$('topDate').textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+['일','월','화','수','목','금','토'][d.getDay()]+')';
  $('eyeLabel').textContent=S.eyeInt===0?'끄기':S.eyeInt+'분';
  $('lockLabel').textContent=S.autoLock===0?'끄기':S.autoLock+'분';
  rMood();rDash();rNA();rPomo();rW();rH();rRtn();
  // 오늘 할일
  const todos=S.tasks.filter(t=>t.status==='todo');
  const tT=[],uT=[];
  todos.forEach(t=>{if(t.date===T||(t.date&&t.date<=T))tT.push(t);else if(!t.date)uT.push(t)});
  tT.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  $('tList').innerHTML=tT.length?tT.map(t=>tHTML(t,'today')).join(''):'<div class="empty">오늘 할 일이 없어요<br>+ 버튼으로 추가하세요</div>';
  $('tCnt').textContent=tT.length;
  $('uList').innerHTML=uT.length?uT.map(t=>tHTML(t,'urgent')).join(''):'<div class="empty">없음</div>';
  $('uCnt').textContent=uT.length;$('secU').style.display=uT.length?'':'none';
  rDD();
  // 할일 전체
  const sq=$('sTodo').value.toLowerCase();
  const allT=sq?todos.filter(t=>t.title.toLowerCase().includes(sq)||(t.desc||'').toLowerCase().includes(sq)):todos;
  allT.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
  $('aList').innerHTML=allT.length?allT.map(t=>{const tag=t.date===T?'today':!t.date?'urgent':t.date>T?'future':'today';return tHTML(t,tag)}).join(''):'<div class="empty">할 일이 없어요<br>+ 버튼으로 추가하세요</div>';
  $('aCnt').textContent=allT.length;
  rWeek();rCal('calT',t=>t.status==='todo');rMm();
  // 기록
  const done=S.tasks.filter(t=>t.status==='done');const dq=$('sDone').value.toLowerCase();
  const fd=dq?done.filter(t=>t.title.toLowerCase().includes(dq)):done;
  fd.sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  $('dCnt').textContent=fd.length;
  $('dList').innerHTML=fd.length?fd.map(t=>{const cat=CATS.find(c=>c.id===t.cat);return'<div class="ti" onclick="opDet(_tm['+t.id+'])"><div class="tt"><div class="tc ck"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>'+(cat?'<span class="cat-dot" style="background:'+cat.color+'"></span>':'')+'<div class="tif"><div class="tit" style="text-decoration:line-through;color:var(--text2)">'+esc(t.title)+'</div><div class="tm"><span>'+dl(t.completedAt)+'</span>'+(t.repeat?'<span class="tg repeat">반복</span>':'')+'</div></div></div></div>'}).join(''):'<div class="empty">아직 없어요</div>';
  rCal('calD',t=>t.status==='done');rStats();
  // 설정
  const ar=S.tasks.filter(t=>t.status==='archived');$('arCnt').textContent=ar.length;
  $('arList').innerHTML=ar.length?ar.map(t=>'<div class="ti" onclick="opDet(_tm['+t.id+'])"><div class="tt"><div class="tif"><div class="tit">'+esc(t.title)+'</div><div class="tm"><span>'+dl(t.archivedAt||t.createdAt)+'</span></div></div><button style="background:rgba(123,138,238,.12);border:none;border-radius:8px;color:var(--accent);font-size:.8rem;padding:8px 14px" onclick="event.stopPropagation();rT('+t.id+')">복원</button></div></div>').join(''):'<div class="empty">비어있음</div>';
}

$('sTodo').addEventListener('input',R);$('sDone').addEventListener('input',R);
setInterval(()=>{if(S.lastDate!==td())location.reload()},6e4);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
initLk();
</script>
</body>
</html>
