<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#7c8aff">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>Daily Todo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, 'Malgun Gothic', 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0;
      overflow-x: hidden;
    }

    /* 상단 헤더 */
    .app-header {
      background: linear-gradient(135deg, #1a1a3e, #12122a);
      padding: 20px 20px 24px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid #2a2a4a;
    }

    .app-header h1 {
      font-size: 1.5rem;
      color: #fff;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .date-display {
      font-size: 0.85rem;
      color: #8888aa;
      margin-top: 4px;
    }

    /* 진행률 */
    .progress-section {
      padding: 16px 20px 0;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-label {
      font-size: 0.8rem;
      color: #888;
    }

    .progress-pct {
      font-size: 0.85rem;
      font-weight: 700;
      color: #a78bfa;
    }

    .progress-bar-bg {
      background: #1a1a2e;
      border-radius: 20px;
      height: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c8aff, #a78bfa, #c084fc);
      border-radius: 20px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 컨텐츠 영역 */
    .content {
      padding: 20px 16px 120px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* 섹션 */
    .section {
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #a78bfa;
    }

    .section-count {
      font-size: 0.75rem;
      color: #666;
      background: #1a1a2e;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* 할일 아이템 */
    .task-list {
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: #1a1a2e;
      border-radius: 14px;
      margin-bottom: 8px;
      transition: all 0.2s ease;
      -webkit-user-select: none;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .task-item:active {
      transform: scale(0.98);
      background: #22223a;
    }

    .task-item.done {
      opacity: 0.45;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #555;
    }

    /* 체크박스 */
    .check {
      width: 26px;
      height: 26px;
      border: 2.5px solid #3a3a5a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s ease;
    }

    .task-item.done .check {
      background: linear-gradient(135deg, #7c8aff, #a78bfa);
      border-color: transparent;
    }

    .check svg {
      width: 16px;
      height: 16px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.25s ease;
    }

    .task-item.done .check svg {
      opacity: 1;
      transform: scale(1);
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      transition: all 0.2s;
    }

    /* 삭제 버튼 (스와이프 대신 길게 누르기 또는 X 버튼) */
    .btn-delete {
      background: none;
      border: none;
      color: #444;
      font-size: 1.1rem;
      padding: 6px 2px 6px 8px;
      cursor: pointer;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:active {
      color: #ff6b6b;
    }

    /* 하단 고정 입력바 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #12122a;
      border-top: 1px solid #2a2a4a;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      z-index: 50;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 600px;
      margin: 0 auto;
    }

    .todo-input {
      flex: 1;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 14px;
      padding: 14px 18px;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .todo-input:focus {
      border-color: #7c8aff;
    }

    .todo-input::placeholder {
      color: #555;
    }

    .btn-submit {
      background: linear-gradient(135deg, #7c8aff, #a78bfa);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 1.5rem;
      width: 54px;
      cursor: pointer;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .btn-submit:active {
      transform: scale(0.92);
    }

    /* 루틴 관리 버튼 */
    .btn-manage {
      background: none;
      border: 1.5px solid #3a3a5a;
      color: #777;
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-manage:active {
      border-color: #7c8aff;
      color: #7c8aff;
    }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 24px 16px;
      color: #444;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ===== 모달 (루틴 관리) ===== */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal-sheet {
      background: #1a1a2e;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: #3a3a5a;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 16px;
    }

    .modal-input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .modal-input {
      flex: 1;
      background: #12121f;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal-input:focus {
      border-color: #7c8aff;
    }

    .modal-input::placeholder {
      color: #555;
    }

    .modal-btn-add {
      background: linear-gradient(135deg, #7c8aff, #a78bfa);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.3rem;
      width: 50px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .modal-btn-add:active {
      transform: scale(0.92);
    }

    .routine-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #12121f;
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .routine-item .r-text {
      flex: 1;
      font-size: 0.9rem;
      color: #ccc;
    }

    .routine-item .r-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 0.95rem;
      padding: 4px 6px;
      cursor: pointer;
    }

    .routine-item .r-btn:active {
      color: #ff6b6b;
    }

    .routine-item .r-btn.edit:active {
      color: #7c8aff;
    }

    .btn-close-sheet {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: #2a2a4a;
      border: none;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-close-sheet:active {
      background: #3a3a5a;
    }

    /* 토스트 알림 */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #2a2a4a;
      color: #e0e0e0;
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 0.85rem;
      z-index: 300;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 완료 축하 애니메이션 */
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <!-- 상단 헤더 -->
  <div class="app-header">
    <h1>Daily Todo</h1>
    <div class="date-display" id="dateDisplay"></div>
  </div>

  <!-- 진행률 -->
  <div class="progress-section">
    <div class="progress-info">
      <span class="progress-label">오늘의 진행률</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>
  </div>

  <!-- 컨텐츠 -->
  <div class="content">

    <!-- 고정 루틴 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">고정 루틴</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="section-count" id="routineCount">0/0</span>
          <button class="btn-manage" id="btnManage">관리</button>
        </div>
      </div>
      <ul class="task-list" id="routineList"></ul>
    </div>

    <!-- 오늘 할일 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">오늘 할일</span>
        <span class="section-count" id="todoCount">0/0</span>
      </div>
      <ul class="task-list" id="todoList"></ul>
    </div>
  </div>

  <!-- 하단 입력바 -->
  <div class="bottom-bar">
    <div class="input-row">
      <input type="text" class="todo-input" id="todoInput" placeholder="새 할일을 입력하세요" enterkeyhint="done" />
      <button class="btn-submit" id="btnAdd">+</button>
    </div>
  </div>

  <!-- 루틴 관리 모달 (바텀 시트) -->
  <div class="modal-bg" id="modalBg">
    <div class="modal-sheet" id="modalSheet">
      <div class="modal-handle"></div>
      <div class="modal-title">고정 루틴 관리</div>
      <div class="modal-input-row">
        <input type="text" class="modal-input" id="routineInput" placeholder="새 루틴 추가" enterkeyhint="done" />
        <button class="modal-btn-add" id="btnAddRoutine">+</button>
      </div>
      <div id="routineManageList"></div>
      <button class="btn-close-sheet" id="btnCloseModal">닫기</button>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <script>
    // ====== 데이터 ======
    const KEY = 'dailyTodo_v2';

    const DEFAULTS = [
      '기상 후 물 한 잔',
      '스트레칭 10분',
      '오늘 할일 정리',
      '운동 30분',
      '독서 20분',
      '하루 회고 작성',
    ];

    function today() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function load() {
      try { return JSON.parse(localStorage.getItem(KEY)); } catch { return null; }
    }

    function save() {
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    // 초기화
    let state = load();
    const t = today();

    if (!state) {
      state = {
        routines: DEFAULTS.slice(),
        checks: {},
        todos: [],
        lastDate: t,
      };
      state.checks[t] = new Array(state.routines.length).fill(false);
      save();
    }

    // 날짜 바뀌면 루틴 리셋
    if (state.lastDate !== t) {
      state.checks[t] = new Array(state.routines.length).fill(false);
      state.lastDate = t;
      // 7일 지난 기록 정리
      Object.keys(state.checks).forEach(k => {
        if ((new Date(t) - new Date(k)) / 86400000 > 7) delete state.checks[k];
      });
      save();
    }

    // 루틴 개수 맞추기
    if (!state.checks[t] || state.checks[t].length !== state.routines.length) {
      const old = state.checks[t] || [];
      state.checks[t] = state.routines.map((_, i) => old[i] || false);
      save();
    }

    // ====== 토스트 ======
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    // ====== 렌더링 ======
    function render() {
      renderDate();
      renderRoutines();
      renderTodos();
      renderProgress();
    }

    function renderDate() {
      const d = new Date();
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      document.getElementById('dateDisplay').textContent =
        d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
    }

    function renderRoutines() {
      const list = document.getElementById('routineList');
      const checks = state.checks[t] || [];

      if (state.routines.length === 0) {
        list.innerHTML = '<div class="empty">고정 루틴이 없습니다<br>아래 [관리] 버튼으로 추가해보세요</div>';
      } else {
        list.innerHTML = state.routines.map((r, i) =>
          '<li class="task-item' + (checks[i] ? ' done' : '') + '" data-t="r" data-i="' + i + '">' +
            '<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
            '<span class="task-text">' + esc(r) + '</span>' +
          '</li>'
        ).join('');
      }

      const done = checks.filter(Boolean).length;
      document.getElementById('routineCount').textContent = done + '/' + state.routines.length;
    }

    function renderTodos() {
      const list = document.getElementById('todoList');

      if (state.todos.length === 0) {
        list.innerHTML = '<div class="empty">할일이 없어요!<br>아래에서 새 할일을 추가하세요</div>';
      } else {
        list.innerHTML = state.todos.map((todo, i) =>
          '<li class="task-item' + (todo.done ? ' done' : '') + '" data-t="d" data-i="' + i + '">' +
            '<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
            '<span class="task-text">' + esc(todo.text) + '</span>' +
            '<button class="btn-delete" onclick="event.stopPropagation();delTodo(' + i + ')">&#10005;</button>' +
          '</li>'
        ).join('');
      }

      const done = state.todos.filter(x => x.done).length;
      document.getElementById('todoCount').textContent = done + '/' + state.todos.length;
    }

    function renderProgress() {
      const checks = state.checks[t] || [];
      const dr = checks.filter(Boolean).length;
      const dt = state.todos.filter(x => x.done).length;
      const total = state.routines.length + state.todos.length;
      const done = dr + dt;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressPct').textContent = pct + '%';

      // 100% 달성 시 축하
      if (pct === 100 && total > 0) {
        showToast('오늘 할일 모두 완료! 수고했어요!');
      }
    }

    // ====== 이벤트 ======

    // 체크 토글
    document.addEventListener('click', function(e) {
      const item = e.target.closest('.task-item');
      if (!item || e.target.closest('.btn-delete')) return;

      const type = item.dataset.t;
      const idx = parseInt(item.dataset.i);

      if (type === 'r') {
        if (!state.checks[t]) state.checks[t] = new Array(state.routines.length).fill(false);
        state.checks[t][idx] = !state.checks[t][idx];
        if (state.checks[t][idx]) showToast('완료!');
      } else if (type === 'd') {
        state.todos[idx].done = !state.todos[idx].done;
        if (state.todos[idx].done) showToast('완료!');
      }
      save();
      render();
    });

    // 할일 추가
    document.getElementById('btnAdd').addEventListener('click', addTodo);
    document.getElementById('todoInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); addTodo(); }
    });

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      state.todos.push({ id: Date.now(), text: text, done: false });
      save();
      input.value = '';
      input.blur();
      render();
      showToast('할일 추가됨');
    }

    function delTodo(idx) {
      const name = state.todos[idx].text;
      if (confirm('"' + name + '" 삭제할까요?')) {
        state.todos.splice(idx, 1);
        save();
        render();
        showToast('삭제됨');
      }
    }

    // ====== 루틴 관리 모달 ======
    document.getElementById('btnManage').addEventListener('click', function() {
      document.getElementById('modalBg').classList.add('open');
      renderManageList();
    });

    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    document.getElementById('modalBg').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    function closeModal() {
      document.getElementById('modalBg').classList.remove('open');
      render();
    }

    // 루틴 추가
    document.getElementById('btnAddRoutine').addEventListener('click', addRoutine);
    document.getElementById('routineInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); addRoutine(); }
    });

    function addRoutine() {
      const input = document.getElementById('routineInput');
      const text = input.value.trim();
      if (!text) return;
      state.routines.push(text);
      if (!state.checks[t]) state.checks[t] = [];
      state.checks[t].push(false);
      save();
      input.value = '';
      renderManageList();
      showToast('루틴 추가됨');
    }

    function renderManageList() {
      const el = document.getElementById('routineManageList');
      if (state.routines.length === 0) {
        el.innerHTML = '<div class="empty">루틴이 없습니다. 위에서 추가해보세요!</div>';
        return;
      }
      el.innerHTML = state.routines.map(function(r, i) {
        return '<div class="routine-item">' +
          '<span class="r-text">' + esc(r) + '</span>' +
          '<button class="r-btn edit" onclick="editRoutine(' + i + ')">수정</button>' +
          '<button class="r-btn" onclick="delRoutine(' + i + ')">삭제</button>' +
        '</div>';
      }).join('');
    }

    window.editRoutine = function(idx) {
      const cur = state.routines[idx];
      const input = prompt('루틴 수정:', cur);
      if (input !== null && input.trim()) {
        state.routines[idx] = input.trim();
        save();
        renderManageList();
        showToast('수정됨');
      }
    };

    window.delRoutine = function(idx) {
      if (confirm('"' + state.routines[idx] + '" 루틴을 삭제할까요?')) {
        state.routines.splice(idx, 1);
        if (state.checks[t]) state.checks[t].splice(idx, 1);
        save();
        renderManageList();
        showToast('삭제됨');
      }
    };

    // ====== 유틸 ======
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // 날짜 변경 자동 감지 (1분마다)
    setInterval(function() {
      const now = today();
      if (state.lastDate !== now) {
        location.reload();
      }
    }, 60000);

    // ====== PWA 서비스 워커 등록 ======
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function() {});
    }

    // 초기 렌더링
    render();
  </script>
</body>
</html>
