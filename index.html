<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d16">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>Daily Todo</title>
  <style>
    :root{--bg:#0d0d16;--card:#151524;--card2:#1c1c30;--border:#252540;--text:#d0d0dd;--text2:#8888a0;--accent:#7b8aee;--accent2:#9b8cd8;--today:#5c6bc0;--urgent:#c49060;--done:#5a9e6f;--archive:#7a7a90;--danger:#c06060;--water:#4fc3f7;--safe-b:env(safe-area-inset-bottom,0px)}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,'Malgun Gothic','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;font-size:15px}
    input,textarea,select,button{font-family:inherit;font-size:inherit}button{cursor:pointer}

    /* 잠금 */
    #lockScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}
    #lockScreen.hidden{display:none}
    .lock-title{font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:8px}
    .lock-sub{color:var(--text2);font-size:.85rem;margin-bottom:30px}
    .pin-dots{display:flex;gap:14px;margin-bottom:30px}
    .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:.2s}
    .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
    .pin-dot.wrong{background:var(--danger);border-color:var(--danger);animation:shake .4s}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
    .pin-key{width:72px;height:72px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:1.5rem;font-weight:600;transition:.15s}
    .pin-key:active{background:var(--accent);color:#fff;transform:scale(.93)}
    .pin-key.fn{font-size:.8rem;color:var(--text2)}

    /* 앱 */
    #app{display:none}#app.show{display:block}
    .top-bar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:14px 18px 18px}
    .top-row{display:flex;align-items:center;justify-content:space-between}
    .top-date{font-size:.82rem;color:var(--text2)}
    .top-title{font-size:1.25rem;font-weight:800;color:#fff}
    .btn-lock{background:none;border:none;color:var(--text2);font-size:1.1rem;padding:6px}
    .btn-notif{background:none;border:none;color:var(--text2);font-size:1.1rem;padding:6px;margin-right:4px;position:relative}
    .notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--danger)}

    /* 탭 */
    .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:90;padding-bottom:var(--safe-b)}
    .tab-btn{flex:1;padding:8px 0 6px;background:none;border:none;color:var(--text2);font-size:.6rem;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.2s;position:relative}
    .tab-btn.active{color:var(--accent)}
    .tab-btn svg{width:21px;height:21px}
    .tab-badge{background:var(--danger);color:#fff;font-size:.5rem;border-radius:10px;padding:1px 4px;position:absolute;top:2px;right:calc(50% - 18px)}

    /* 페이지 */
    .page{display:none;padding:0 16px 100px;max-width:600px;margin:0 auto}.page.active{display:block}
    .sec{margin-bottom:20px}
    .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
    .sec-title{font-size:.88rem;font-weight:700;color:var(--accent2)}
    .sec-count{font-size:.68rem;color:var(--text2);background:var(--card);padding:2px 9px;border-radius:12px}
    .sec-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 11px;border-radius:8px;font-size:.7rem}
    .sec-btn:active{border-color:var(--accent);color:var(--accent)}

    /* 검색 */
    .search-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);width:100%;outline:none;margin-bottom:12px;font-size:.88rem}
    .search-bar:focus{border-color:var(--accent)}.search-bar::placeholder{color:#555}

    /* 대시보드 카드 */
    .dash-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .dash-card{background:var(--card);border-radius:14px;padding:14px;text-align:center}
    .dash-num{font-size:1.8rem;font-weight:800;line-height:1}
    .dash-label{font-size:.7rem;color:var(--text2);margin-top:4px}

    /* 물마시기 */
    .water-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px}
    .water-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .water-title{font-size:.88rem;font-weight:700;color:var(--water)}
    .water-count{font-size:.82rem;color:var(--text2)}
    .water-cups{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
    .water-cup{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:.2s;cursor:pointer}
    .water-cup.filled{background:rgba(79,195,247,.2);border-color:var(--water)}
    .water-cup:active{transform:scale(.9)}
    .water-reminder{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.75rem;color:var(--text2)}
    .water-reminder select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 6px;font-size:.75rem}

    /* 습관 트래커 */
    .habit-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border-radius:10px;margin-bottom:5px}
    .habit-item:active{background:var(--card2)}
    .habit-item.done{opacity:.45}
    .habit-icon{font-size:1.1rem;flex-shrink:0}
    .habit-text{flex:1;font-size:.88rem}
    .habit-streak{font-size:.65rem;color:var(--accent);background:rgba(123,138,238,.12);padding:2px 7px;border-radius:8px}
    .h-check{width:24px;height:24px;border:2px solid var(--border);border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
    .habit-item.done .h-check{background:var(--done);border-color:var(--done)}
    .h-check svg{width:14px;height:14px;opacity:0;transition:.2s}
    .habit-item.done .h-check svg{opacity:1}

    /* D-day */
    .dday-item{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
    .dday-name{font-size:.88rem}
    .dday-count{font-size:1rem;font-weight:800}
    .dday-count.past{color:var(--done)}
    .dday-count.future{color:var(--accent)}
    .dday-date{font-size:.7rem;color:var(--text2)}

    /* 할일 아이템 */
    .t-item{background:var(--card);border-radius:12px;padding:11px 14px;margin-bottom:6px;transition:.15s;position:relative}
    .t-item:active{transform:scale(.985);background:var(--card2)}
    .t-top{display:flex;align-items:center;gap:10px}
    .t-check{width:24px;height:24px;border:2px solid var(--border);border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
    .t-check.checked{background:var(--done);border-color:var(--done)}
    .t-check svg{width:14px;height:14px;opacity:0;transition:.2s}
    .t-check.checked svg{opacity:1}
    .t-info{flex:1;min-width:0}
    .t-title{font-size:.9rem;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t-meta{font-size:.7rem;color:var(--text2);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
    .t-tag{padding:1px 6px;border-radius:6px;font-size:.62rem;font-weight:600}
    .t-tag.today{background:rgba(92,107,192,.2);color:var(--today)}
    .t-tag.urgent{background:rgba(196,144,96,.15);color:var(--urgent)}
    .t-tag.future{background:rgba(120,120,150,.15);color:var(--text2)}
    .t-tag.repeat{background:rgba(123,138,238,.12);color:var(--accent)}
    .t-actions{display:flex;gap:1px;flex-shrink:0}
    .t-btn{background:none;border:none;color:var(--text2);padding:4px;font-size:.82rem;border-radius:6px}
    .t-btn:active{color:var(--accent)}

    /* 루틴 */
    .routine-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:10px;margin-bottom:5px}
    .routine-item:active{background:var(--card2)}
    .routine-item.done{opacity:.4}
    .routine-item.done .r-text{text-decoration:line-through}
    .r-text{flex:1;font-size:.86rem}

    /* 달력 */
    .cal{background:var(--card);border-radius:14px;padding:14px}
    .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .cal-title{font-size:.88rem;font-weight:700;color:var(--text)}
    .cal-nav{background:none;border:none;color:var(--text2);font-size:1.1rem;padding:4px 8px}
    .cal-nav:active{color:var(--accent)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:1px}
    .cal-day-name{font-size:.62rem;color:var(--text2);padding:3px 0}
    .cal-day{font-size:.75rem;padding:5px 0;border-radius:8px;color:var(--text2);position:relative;cursor:pointer}
    .cal-day:active{background:var(--card2)}
    .cal-day.today{color:#fff;font-weight:700;background:var(--today)}
    .cal-day.has-task::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
    .cal-day.other{opacity:.25}

    /* 메모 */
    .memo-area{background:var(--card);border-radius:12px;padding:12px 14px}
    .memo-input{width:100%;background:transparent;border:none;color:var(--text);resize:none;outline:none;font-size:.86rem;line-height:1.5;min-height:50px}
    .memo-input::placeholder{color:#555}
    .memo-list{margin-top:8px}
    .memo-item{padding:7px 10px;background:var(--bg);border-radius:8px;margin-bottom:4px;font-size:.8rem;display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
    .memo-item .m-text{flex:1;line-height:1.4;white-space:pre-wrap;word-break:break-word}
    .memo-item .m-date{font-size:.62rem;color:var(--text2);white-space:nowrap}
    .memo-item .m-del{background:none;border:none;color:#555;font-size:.8rem;padding:0 2px;flex-shrink:0}

    /* 연락처 */
    .c-item{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:6px}
    .c-item:active{background:var(--card2)}
    .c-name{font-size:.92rem;font-weight:600}
    .c-detail{font-size:.76rem;color:var(--text2);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px}

    /* 통계 */
    .stat-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px}
    .stat-title{font-size:.82rem;color:var(--text2);margin-bottom:10px}
    .stat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .stat-bar-label{font-size:.72rem;color:var(--text2);width:40px;text-align:right}
    .stat-bar-bg{flex:1;background:var(--bg);border-radius:6px;height:8px;overflow:hidden}
    .stat-bar-fill{height:100%;border-radius:6px;transition:width .5s}

    /* 모달 */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px 18px;padding-bottom:calc(20px + var(--safe-b));animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .modal-head{font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:16px}
    .form-group{margin-bottom:12px}
    .form-label{font-size:.76rem;color:var(--text2);margin-bottom:4px;display:block}
    .form-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);outline:none}
    .form-input:focus{border-color:var(--accent)}.form-input::placeholder{color:#555}
    textarea.form-input{resize:none;min-height:60px;line-height:1.4}
    .form-row{display:flex;gap:10px}.form-row>*{flex:1}
    .form-check{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text2);cursor:pointer}
    .form-check input{accent-color:var(--accent);width:17px;height:17px}
    .btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-size:.92rem;font-weight:700}
    .btn-primary:active{opacity:.85;transform:scale(.98)}
    .btn-secondary{width:100%;padding:11px;background:var(--card2);border:none;border-radius:10px;color:var(--text);font-size:.88rem;margin-top:8px}
    .btn-row{display:flex;gap:8px;margin-top:10px}
    .btn-row button{flex:1;padding:11px;border:none;border-radius:10px;font-size:.85rem;font-weight:600}
    .btn-done{background:rgba(90,158,111,.2);color:var(--done)}
    .btn-archive{background:rgba(122,122,144,.15);color:var(--archive)}
    .btn-restore{background:rgba(123,138,238,.15);color:var(--accent)}
    .btn-danger{background:rgba(192,96,96,.15);color:var(--danger)}
    .btn-edit{background:rgba(123,138,238,.15);color:var(--accent)}
    .btn-download{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:.82rem;width:100%;margin-bottom:12px}
    .btn-download:active{border-color:var(--done);color:var(--done)}
    .contact-pick{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
    .contact-chip{padding:3px 9px;border-radius:8px;font-size:.72rem;border:1px solid var(--border);color:var(--text2);cursor:pointer}
    .contact-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}

    /* FAB */
    .fab{position:fixed;bottom:calc(62px + var(--safe-b));right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:1.7rem;z-index:80;box-shadow:0 4px 16px rgba(123,138,238,.3);display:flex;align-items:center;justify-content:center}
    .fab:active{transform:scale(.9)}

    /* 토스트 */
    .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card2);color:var(--text);padding:10px 22px;border-radius:12px;font-size:.8rem;z-index:500;opacity:0;transition:.3s;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .empty{text-align:center;padding:24px 16px;color:#444;font-size:.85rem;line-height:1.6}

    /* 알람 배너 */
    .alarm-banner{background:linear-gradient(135deg,rgba(92,107,192,.15),rgba(155,140,216,.1));border:1px solid rgba(92,107,192,.3);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:.82rem;cursor:pointer}
    .alarm-banner:active{opacity:.8}
    .alarm-icon{font-size:1.3rem}
    .alarm-text{flex:1}
    .alarm-time{font-size:.75rem;color:var(--accent)}
  </style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-title">Daily Todo</div>
  <div class="lock-sub" id="lockSub">PIN 4자리를 입력하세요</div>
  <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
  <div class="pin-pad" id="pinPad">
    <button class="pin-key" data-v="1">1</button><button class="pin-key" data-v="2">2</button><button class="pin-key" data-v="3">3</button>
    <button class="pin-key" data-v="4">4</button><button class="pin-key" data-v="5">5</button><button class="pin-key" data-v="6">6</button>
    <button class="pin-key" data-v="7">7</button><button class="pin-key" data-v="8">8</button><button class="pin-key" data-v="9">9</button>
    <button class="pin-key fn" data-v="reset" id="btnPinReset" style="visibility:hidden">초기화</button>
    <button class="pin-key" data-v="0">0</button><button class="pin-key fn" data-v="del">⌫</button>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div class="top-row">
      <div><div class="top-date" id="topDate"></div><div class="top-title" id="topTitle">오늘</div></div>
      <div style="display:flex;align-items:center">
        <button class="btn-notif" id="btnNotif" title="알림">🔔<span class="notif-dot" id="notifDot" style="display:none"></span></button>
        <button class="btn-lock" id="btnLogout" title="잠금">🔒</button>
      </div>
    </div>
  </div>

  <!-- ===== 오늘 탭 ===== -->
  <div class="page active" id="pageToday">
    <!-- 대시보드 -->
    <div class="dash-row">
      <div class="dash-card"><div class="dash-num" id="dashTodo" style="color:var(--accent)">0</div><div class="dash-label">오늘 할 일</div></div>
      <div class="dash-card"><div class="dash-num" id="dashDone" style="color:var(--done)">0</div><div class="dash-label">완료</div></div>
    </div>
    <div class="dash-row">
      <div class="dash-card"><div class="dash-num" id="dashHabit" style="color:var(--accent2)">0%</div><div class="dash-label">습관 달성</div></div>
      <div class="dash-card"><div class="dash-num" id="dashDday" style="color:var(--urgent)">-</div><div class="dash-label">다음 D-day</div></div>
    </div>

    <!-- 다음 알람 -->
    <div id="nextAlarm"></div>

    <!-- 물마시기 -->
    <div class="water-card">
      <div class="water-top">
        <span class="water-title">💧 물 마시기</span>
        <span class="water-count" id="waterCount">0 / 8잔</span>
      </div>
      <div class="water-cups" id="waterCups"></div>
      <div class="water-reminder">
        <span>알림 주기:</span>
        <select id="waterInterval">
          <option value="0">꺼짐</option>
          <option value="30">30분</option>
          <option value="60" selected>1시간</option>
          <option value="90">1시간 30분</option>
          <option value="120">2시간</option>
        </select>
      </div>
    </div>

    <!-- 습관 -->
    <div class="sec">
      <div class="sec-head">
        <span class="sec-title">오늘의 습관</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="sec-count" id="habitCount">0/0</span>
          <button class="sec-btn" id="btnManageHabit">관리</button>
        </div>
      </div>
      <div id="habitList"></div>
    </div>

    <!-- 고정 루틴 -->
    <div class="sec">
      <div class="sec-head">
        <span class="sec-title">고정 루틴</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="sec-count" id="routineCount">0/0</span>
          <button class="sec-btn" id="btnManageRoutine">관리</button>
        </div>
      </div>
      <div id="routineList"></div>
    </div>

    <!-- 오늘 할일 -->
    <div class="sec">
      <div class="sec-head"><span class="sec-title">오늘 할 일</span><span class="sec-count" id="todayTaskCount">0</span></div>
      <div id="todayTaskList"></div>
    </div>

    <!-- 며칠 내 -->
    <div class="sec" id="secUrgent">
      <div class="sec-head"><span class="sec-title">며칠 내 해야 할 일</span><span class="sec-count" id="urgentCount">0</span></div>
      <div id="urgentList"></div>
    </div>

    <!-- D-day -->
    <div class="sec">
      <div class="sec-head"><span class="sec-title">D-day</span><button class="sec-btn" id="btnAddDday">추가</button></div>
      <div id="ddayList"></div>
    </div>
  </div>

  <!-- ===== 할일 탭 ===== -->
  <div class="page" id="pageTodo">
    <input type="text" class="search-bar" id="searchTodo" placeholder="할 일 검색..." />
    <div class="sec"><div class="sec-head"><span class="sec-title">전체 할 일</span><span class="sec-count" id="allTodoCount">0</span></div><div id="allTodoList"></div></div>

  <div class="modal-head">D-day 추가</div>
  <div class="form-group"><label class="form-label">이름</label><input type="text" class="form-input" id="ddayName" placeholder="시험, 프로젝트 마감 등" /></div>
  <div class="form-group"><label class="form-label">날짜</label><input type="date" class="form-input" id="ddayDate" /></div>
  <button class="btn-primary" id="btnSaveDday">저장</button>
  <button class="btn-secondary" onclick="closeModal('modalDday')">취소</button>
</div></div>

<div class="toast" id="toast"></div>

<script>
const KEY='dailyTodo_v4', PIN_KEY='dailyTodo_pin';
const DEFAULTS_R=['기상 후 물 한 잔','스트레칭 10분','오늘 할일 정리','운동 30분','독서 20분','하루 회고 작성'];
const DEFAULTS_H=[{name:'비타민 챙기기',icon:'💊',alarm:0},{name:'산책하기',icon:'🚶',alarm:0},{name:'명상 5분',icon:'🧘',alarm:0}];

function td(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dl(ds){if(!ds)return'';const d=new Date(ds+'T00:00:00');return(d.getMonth()+1)+'/'+d.getDate()+'('+['일','월','화','수','목','금','토'][d.getDay()]+')'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch{return null}}
function save(){localStorage.setItem(KEY,JSON.stringify(S));updateTaskMap()}

let S=load();const TODAY=td();
if(!S){S={routines:DEFAULTS_R.slice(),rChecks:{},tasks:[],contacts:[],memos:[],habits:DEFAULTS_H.map((h,i)=>({id:Date.now()+i,...h})),habitChecks:{},water:{},waterGoal:8,waterInterval:60,ddays:[],lastDate:TODAY};S.rChecks[TODAY]=new Array(S.routines.length).fill(false);S.habitChecks[TODAY]=new Array(S.habits.length).fill(false);S.water[TODAY]=0;save()}

// 마이그레이션
if(!S.habits){S.habits=DEFAULTS_H.map((h,i)=>({id:Date.now()+i,...h}));S.habitChecks={};save()}
if(!S.water){S.water={};S.waterGoal=8;S.waterInterval=60;save()}
if(!S.ddays){S.ddays=[];save()}
if(!S.memos)S.memos=[];

// 날짜 리셋
if(S.lastDate!==TODAY){
  S.rChecks[TODAY]=new Array(S.routines.length).fill(false);
  S.habitChecks[TODAY]=new Array(S.habits.length).fill(false);
  S.water[TODAY]=0;
  // 미완료 이월
  S.tasks.forEach(t=>{if(t.status==='todo'&&t.date&&t.date<TODAY&&!t.repeat)t.date=TODAY});
  // 반복 할일 생성
  S.tasks.filter(t=>t.repeat&&t.status==='done'&&t.completedAt===S.lastDate).forEach(t=>{
    const shouldRepeat = t.repeat==='daily'||(t.repeat==='weekday'&&[1,2,3,4,5].includes(new Date().getDay()))||(t.repeat==='weekly'&&new Date(t.date).getDay()===new Date().getDay())||(t.repeat==='monthly'&&new Date(t.date).getDate()===new Date().getDate());
    if(shouldRepeat){S.tasks.push({...t,id:Date.now()+Math.random()*1000|0,status:'todo',date:TODAY,completedAt:null})}
  });
  S.lastDate=TODAY;
  Object.keys(S.rChecks).forEach(k=>{if((new Date(TODAY)-new Date(k))/864e5>14)delete S.rChecks[k]});
  Object.keys(S.habitChecks).forEach(k=>{if((new Date(TODAY)-new Date(k))/864e5>30)delete S.habitChecks[k]});
  Object.keys(S.water).forEach(k=>{if((new Date(TODAY)-new Date(k))/864e5>30)delete S.water[k]});
  save();
}
if(!S.rChecks[TODAY]||S.rChecks[TODAY].length!==S.routines.length){const o=S.rChecks[TODAY]||[];S.rChecks[TODAY]=S.routines.map((_,i)=>o[i]||false);save()}
if(!S.habitChecks[TODAY]||S.habitChecks[TODAY].length!==S.habits.length){const o=S.habitChecks[TODAY]||[];S.habitChecks[TODAY]=S.habits.map((_,i)=>o[i]||false);save()}
if(S.water[TODAY]===undefined){S.water[TODAY]=0;save()}

// ===== PIN =====
let pinBuf='',pinMode='login',pinSetupVal='';
const lockEl=document.getElementById('lockScreen'),dotsEl=document.getElementById('pinDots').children,lockSub=document.getElementById('lockSub');
function hasPin(){return!!localStorage.getItem(PIN_KEY)}
function hashPin(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}return String(h)}
function initLock(){if(!hasPin()){pinMode='setup';lockSub.textContent='새 PIN 4자리를 설정하세요';document.getElementById('btnPinReset').style.visibility='hidden'}else{pinMode='login';lockSub.textContent='PIN 4자리를 입력하세요';document.getElementById('btnPinReset').style.visibility='visible'}pinBuf='';updDots()}
function updDots(w){Array.from(dotsEl).forEach((d,i)=>{d.className='pin-dot'+(i<pinBuf.length?' filled':'')+(w?' wrong':'')})}
function handlePin(v){
  if(v==='del'){pinBuf=pinBuf.slice(0,-1);updDots();return}
  if(v==='reset'){if(confirm('PIN 초기화 시 모든 데이터가 삭제됩니다.')){localStorage.removeItem(PIN_KEY);localStorage.removeItem(KEY);location.reload()}return}
  if(pinBuf.length>=4)return;pinBuf+=v;updDots();
  if(pinBuf.length===4)setTimeout(()=>{
    if(pinMode==='setup'){pinSetupVal=pinBuf;pinMode='confirm';lockSub.textContent='확인을 위해 한 번 더';pinBuf='';updDots()}
    else if(pinMode==='confirm'){if(pinBuf===pinSetupVal){localStorage.setItem(PIN_KEY,hashPin(pinBuf));toast('PIN 설정 완료');unlock()}else{updDots(true);setTimeout(()=>{pinMode='setup';lockSub.textContent='다시 설정하세요';pinBuf='';updDots()},800)}}
    else{if(hashPin(pinBuf)===localStorage.getItem(PIN_KEY))unlock();else{updDots(true);setTimeout(()=>{pinBuf='';updDots()},500)}}
  },150);
}
document.getElementById('pinPad').addEventListener('click',e=>{const b=e.target.closest('.pin-key');if(b)handlePin(b.dataset.v)});
function unlock(){lockEl.classList.add('hidden');document.getElementById('app').classList.add('show');renderAll();startAlarms()}

// ===== 탭 =====
const pageNames={pageToday:'오늘',pageTodo:'할 일',pageDone:'기록',pageMore:'더보기'};
let currentPage='pageToday';
document.querySelector('.tab-bar').addEventListener('click',e=>{const b=e.target.closest('.tab-btn');if(!b)return;currentPage=b.dataset.page;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===currentPage));document.getElementById('topTitle').textContent=pageNames[currentPage];renderAll()});

// ===== FAB =====
document.getElementById('fab').addEventListener('click',()=>{if(currentPage==='pageMore')openContactModal();else openTaskModal()});

// ===== 토스트 =====
let toastT;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),1800)}

// ===== 모달 =====
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-bg').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id)})});

// ===== 물마시기 =====
function renderWater(){
  const count=S.water[TODAY]||0;
  document.getElementById('waterCount').textContent=count+' / '+S.waterGoal+'잔';
  let html='';for(let i=0;i<S.waterGoal;i++)html+='<div class="water-cup'+(i<count?' filled':'')+'" data-i="'+i+'">💧</div>';
  document.getElementById('waterCups').innerHTML=html;
  document.getElementById('waterInterval').value=S.waterInterval||60;
}
document.getElementById('waterCups').addEventListener('click',e=>{const c=e.target.closest('.water-cup');if(!c)return;const i=parseInt(c.dataset.i);S.water[TODAY]=i<(S.water[TODAY]||0)?i:i+1;save();renderWater();renderDash();if(S.water[TODAY]>=S.waterGoal)toast('오늘 목표 달성!')});
document.getElementById('waterInterval').addEventListener('change',e=>{S.waterInterval=parseInt(e.target.value);save();startAlarms()});

// ===== 습관 =====
function renderHabits(){
  const checks=S.habitChecks[TODAY]||[];
  document.getElementById('habitList').innerHTML=S.habits.length===0?'<div class="empty">습관을 추가해보세요</div>':
    S.habits.map((h,i)=>{
      const streak=getStreak(i);
      return'<div class="habit-item'+(checks[i]?' done':'')+'" onclick="toggleHabit('+i+')">'+
        '<div class="h-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>'+
        '<span class="habit-icon">'+esc(h.icon||'✅')+'</span>'+
        '<span class="habit-text">'+esc(h.name)+'</span>'+
        (streak>1?'<span class="habit-streak">🔥'+streak+'일</span>':'')+
      '</div>'}).join('');
  const done=checks.filter(Boolean).length;
  document.getElementById('habitCount').textContent=done+'/'+S.habits.length;
}
function getStreak(idx){
  let streak=0;const d=new Date();
  for(let i=0;i<60;i++){
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const checks=S.habitChecks[ds];
    if(checks&&checks[idx])streak++;else if(i>0)break;
    d.setDate(d.getDate()-1);
  }return streak;
}
window.toggleHabit=function(i){if(!S.habitChecks[TODAY])S.habitChecks[TODAY]=new Array(S.habits.length).fill(false);S.habitChecks[TODAY][i]=!S.habitChecks[TODAY][i];save();renderHabits();renderDash();if(S.habitChecks[TODAY][i])toast('완료!')};

// 습관 관리
document.getElementById('btnManageHabit').addEventListener('click',()=>{openModal('modalHabit');renderHabitManage()});
document.getElementById('btnAddHabit').addEventListener('click',addHabit);
document.getElementById('newHabitName').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addHabit()}});
function addHabit(){
  const name=document.getElementById('newHabitName').value.trim();if(!name)return;
  const icon=document.getElementById('newHabitIcon').value.trim()||'✅';
  const alarm=parseInt(document.getElementById('newHabitAlarm').value)||0;
  S.habits.push({id:Date.now(),name,icon,alarm});
  if(!S.habitChecks[TODAY])S.habitChecks[TODAY]=[];S.habitChecks[TODAY].push(false);
  save();document.getElementById('newHabitName').value='';document.getElementById('newHabitIcon').value='';renderHabitManage();toast('습관 추가')
}
function renderHabitManage(){
  document.getElementById('habitManageList').innerHTML=S.habits.length===0?'<div class="empty">습관이 없어요</div>':
    S.habits.map((h,i)=>'<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:5px">'+
      '<span>'+esc(h.icon||'✅')+'</span><span style="flex:1;font-size:.86rem">'+esc(h.name)+'</span>'+
      '<button class="t-btn" onclick="delHabit('+i+')" style="color:var(--danger)">삭제</button></div>').join('')
}
window.delHabit=function(i){if(!confirm('"'+S.habits[i].name+'" 삭제?'))return;S.habits.splice(i,1);if(S.habitChecks[TODAY])S.habitChecks[TODAY].splice(i,1);save();renderHabitManage()};

// ===== D-day =====
document.getElementById('btnAddDday').addEventListener('click',()=>{document.getElementById('ddayName').value='';document.getElementById('ddayDate').value='';openModal('modalDday')});
document.getElementById('btnSaveDday').addEventListener('click',()=>{
  const name=document.getElementById('ddayName').value.trim();const date=document.getElementById('ddayDate').value;
  if(!name||!date){toast('이름과 날짜를 입력하세요');return}
  S.ddays.push({id:Date.now(),name,date});save();closeModal('modalDday');renderAll();toast('D-day 추가')
});
function renderDdays(){
  const sorted=[...S.ddays].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('ddayList').innerHTML=sorted.length===0?'<div class="empty">D-day를 추가해보세요</div>':
    sorted.map(d=>{

  const el=document.getElementById(cid);const first=new Date(calY,calM,1);const last=new Date(calY,calM+1,0);

  const todayD=new Date();
  let h='<div class="cal-head"><button class="cal-nav" onclick="calNav(-1,\''+cid+'\','+(filter.toString().includes('done')?'true':'false')+')">◂</button><span class="cal-title">'+calY+'년 '+(calM+1)+'월</span><button class="cal-nav" onclick="calNav(1,\''+cid+'\','+(filter.toString().includes('done')?'true':'false')+')">▸</button></div><div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(d=>h+='<div class="cal-day-name">'+d+'</div>');
  for(let i=0;i<sd;i++)h+='<div class="cal-day other"></div>';
  for(let d=1;d<=dim;d++){const isT=calY===todayD.getFullYear()&&calM===todayD.getMonth()&&d===todayD.getDate();const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');h+='<div class="cal-day'+(isT?' today':'')+(taskDates.has(d)?' has-task':'')+'" onclick="calDayClick(\''+ds+'\')">'+d+'</div>'}
  h+='</div>';el.innerHTML=h;
}

let alarmIntervals=[];
function startAlarms(){
  alarmIntervals.forEach(clearInterval);alarmIntervals=[];
  // 물 알림
  if(S.waterInterval>0&&'Notification' in window&&Notification.permission==='granted'){
    alarmIntervals.push(setInterval(()=>{
      if(S.water[TODAY]<S.waterGoal)new Notification('💧 물 마실 시간!',{body:'오늘 '+S.water[TODAY]+'/'+S.waterGoal+'잔 마셨어요',icon:'./icon-192.png'});
    },S.waterInterval*60000));
  }
  // 할일 알림 (1분마다 체크)
  alarmIntervals.push(setInterval(()=>{
    if(!('Notification' in window)||Notification.permission!=='granted')return;
    const now=new Date();const nowM=now.getHours()*60+now.getMinutes();
    S.tasks.filter(t=>t.status==='todo'&&t.date===TODAY&&t.time&&t.alarm!=null).forEach(t=>{
      const [h,m]=t.time.split(':').map(Number);const taskM=h*60+m;
      const alarmM=taskM-t.alarm;
      if(nowM===alarmM)new Notification('⏰ '+t.title,{body:(t.alarm>0?t.alarm+'분 후 ':'')+t.time+' 예정',icon:'./icon-192.png'});
    });
    // 습관 알림
    S.habits.forEach((h,i)=>{
      if(h.alarm>0&&!(S.habitChecks[TODAY]||[])[i]){
        const mins=now.getHours()*60+now.getMinutes();
        if(mins>0&&mins%h.alarm===0)new Notification(h.icon+' '+h.name,{body:'습관 체크 시간이에요!',icon:'./icon-192.png'});
      }
    });
  },60000));
}

  renderDash();renderNextAlarm();renderWater();renderHabits();renderRoutines();
  // 오늘 할일
  const todos=S.tasks.filter(t=>t.status==='todo');
  const todayT=[],urgentT=[];
  todos.forEach(t=>{if(t.date===TODAY||(!t.date&&!t.urgent&&t.date<=TODAY))todayT.push(t);else if(!t.date||(t.urgent&&!t.date))urgentT.push(t)});
  todayT.sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  document.getElementById('todayTaskList').innerHTML=todayT.length?todayT.map(t=>taskHtml(t,'today')).join(''):'<div class="empty">오늘 할 일 없음</div>';
  document.getElementById('todayTaskCount').textContent=todayT.length;

  document.getElementById('urgentCount').textContent=urgentT.length;
  document.getElementById('secUrgent').style.display=urgentT.length?'':'none';
  renderDdays();
  // 할일 전체
  const sq=document.getElementById('searchTodo').value.toLowerCase();
  const allTodo=sq?todos.filter(t=>t.title.toLowerCase().includes(sq)||(t.desc||'').toLowerCase().includes(sq)):todos;
  allTodo.sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999')||(a.time||'99:99').localeCompare(b.time||'99:99'));
  document.getElementById('allTodoList').innerHTML=allTodo.length?allTodo.map(t=>{const tag=t.date===TODAY?'today':t.urgent?'urgent':t.date>TODAY?'future':'today';return taskHtml(t,tag)}).join(''):'<div class="empty">할 일이 없어요</div>';
  document.getElementById('allTodoCount').textContent=allTodo.length;
  renderCal('calTodo',t=>t.status==='todo');renderMemos();
  // 기록
  const done=S.tasks.filter(t=>t.status==='done');const dq=document.getElementById('searchDone').value.toLowerCase();
  const filtD=dq?done.filter(t=>t.title.toLowerCase().includes(dq)):done;
  filtD.sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  document.getElementById('doneCount').textContent=filtD.length;
  document.getElementById('doneList').innerHTML=filtD.length?filtD.map(t=>'<div class="t-item" onclick="openDetail(window._tasks['+t.id+'])"><div class="t-top"><div class="t-check checked"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="t-info"><div class="t-title" style="text-decoration:line-through;color:var(--text2)">'+esc(t.title)+'</div><div class="t-meta"><span>'+dl(t.completedAt)+'</span>'+(t.repeat?'<span class="t-tag repeat">반복</span>':'')+'</div></div></div></div>').join(''):'<div class="empty">아직 해낸 일이 없어요</div>';
  renderCal('calDone',t=>t.status==='done');renderStats();
  // 더보기
  const cq=document.getElementById('searchContact').value.toLowerCase();
  const filtC=cq?S.contacts.filter(c=>c.name.toLowerCase().includes(cq)||(c.org||'').toLowerCase().includes(cq)):S.contacts;
  document.getElementById('contactList').innerHTML=filtC.length?filtC.map(c=>'<div class="c-item" onclick="openContactEdit('+c.id+')"><div class="c-name">'+esc(c.name)+'</div><div class="c-detail">'+(c.org?'<span>'+esc(c.org)+'</span>':'')+(c.position?'<span>'+esc(c.position)+'</span>':'')+(c.phone?'<span>'+esc(c.phone)+'</span>':'')+'</div></div>').join(''):'<div class="empty">연락처를 추가하세요</div>';
  const archived=S.tasks.filter(t=>t.status==='archived');
  document.getElementById('archiveCount').textContent=archived.length;
  document.getElementById('archiveList').innerHTML=archived.length?archived.map(t=>'<div class="t-item" onclick="openDetail(window._tasks['+t.id+'])"><div class="t-top"><div class="t-info"><div class="t-title">'+esc(t.title)+'</div><div class="t-meta"><span>'+dl(t.archivedAt||t.createdAt)+'</span></div></div><button class="t-btn" onclick="event.stopPropagation();restoreTask('+t.id+')" style="color:var(--accent)">복원</button></div></div>').join(''):'<div class="empty">보관함이 비어있어요</div>';
}

window.openContactEdit=function(id){const c=S.contacts.find(x=>x.id===id);if(c)openContactModal(c)};

function taskHtml(t,tag){
  const meta=[];if(t.date&&t.date!==TODAY)meta.push(dl(t.date));if(t.time)meta.push(t.time);
  return'<div class="t-item" onclick="openDetail(window._tasks['+t.id+'])" data-id="'+t.id+'"><div class="t-top">'+
    '<div class="t-check" onclick="event.stopPropagation();quickDone('+t.id+')"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>'+
    '<div class="t-info"><div class="t-title">'+esc(t.title)+'</div><div class="t-meta">'+
    '<span class="t-tag '+tag+'">'+(tag==='today'?'오늘':tag==='urgent'?'며칠 내':dl(t.date))+'</span>'+
    (t.repeat?'<span class="t-tag repeat">반복</span>':'')+
    (t.alarm!=null?'<span>⏰</span>':'')+
    (meta.length?'<span>'+meta.join(' · ')+'</span>':'')+
    '</div></div></div></div>'
}

// 검색 이벤트
document.getElementById('searchTodo').addEventListener('input',renderAll);
document.getElementById('searchDone').addEventListener('input',renderAll);
document.getElementById('searchContact').addEventListener('input',renderAll);

// 잠금
document.getElementById('btnLogout').addEventListener('click',()=>{document.getElementById('app').classList.remove('show');lockEl.classList.remove('hidden');pinBuf='';updDots();pinMode='login';lockSub.textContent='PIN 4자리를 입력하세요'});

// 날짜 변경 감지
setInterval(()=>{if(S.lastDate!==td())location.reload()},60000);

// PWA
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

updateTaskMap();initLock();
</script>
</body>
</html>
